<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#173D64">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLE Admin">
    <meta name="description" content="BLE Tag Tracker Admin Portal">
    <title>Admin Login - BLE Tag Tracker</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #173D64 0%, #1f4f7e 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-primary {
            background: #173D64;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(23, 61, 100, 0.5);
            background: #1f4f7e;
        }
        .accent-color {
            color: #173D64;
        }
        .bg-accent {
            background: #173D64;
        }
        .focus-accent:focus {
            border-color: #173D64;
        }
    </style>
</head>
<body class="flex items-center justify-center">
    
    <div class="w-full max-w-md px-4">
        
        <!-- Admin Login Screen -->
        <div class="glass rounded-3xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-accent rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-4">
                    <i data-lucide="shield" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Admin Portal</h1>
                <p class="text-gray-600 text-sm">Billing & User Management</p>
            </div>
            
            <form onsubmit="adminLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        required
                        placeholder="admin"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus-accent focus:outline-none transition"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus-accent focus:outline-none transition"
                    >
                </div>
                
                <button type="submit" class="w-full btn-primary text-white font-semibold py-4 px-6 rounded-xl shadow-lg">
                    <span id="loginBtnText" class="flex items-center justify-center gap-2">
                        <i data-lucide="log-in" class="w-5 h-5"></i>
                        Sign In
                    </span>
                    <span id="loginBtnLoading" class="hidden flex items-center justify-center gap-2">
                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                        Signing in...
                    </span>
                </button>
            </form>
            
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl">
                <div class="flex items-center gap-2 text-red-600">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span id="errorText">Invalid credentials</span>
                </div>
            </div>
        </div>
        
    </div>
    
    <script>
        lucide.createIcons();
        
        const API_BASE = window.location.origin + '/api';
        
        // Check if already logged in
        const adminToken = localStorage.getItem('adminToken');
        if (adminToken) {
            window.location.href = '/admin/dashboard';
        }
        
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.remove('hidden');
            lucide.createIcons();
        }
        
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        async function adminLogin(event) {
            event.preventDefault();
            hideError();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Show loading
            document.getElementById('loginBtnText').classList.add('hidden');
            document.getElementById('loginBtnLoading').classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token
                    localStorage.setItem('adminToken', data.token);
                    
                    // Redirect to dashboard
                    window.location.href = '/admin/dashboard';
                } else {
                    showError(data.error || 'Invalid credentials');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                // Hide loading
                document.getElementById('loginBtnText').classList.remove('hidden');
                document.getElementById('loginBtnLoading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
